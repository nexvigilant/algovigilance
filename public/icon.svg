    stroke="#00D9FF"
    stroke-width="3"
    fill="#0A1628"
  />

  <!-- Iris outer ring -->
  <circle
    cx="100"
    cy="100"
    r="25"
    stroke="#00D9FF"
    stroke-width="2"
    fill="#0F1F3D"
  />

  <!-- Iris inner detail -->
  <circle
    cx="100"
    cy="100"
    r="18"
    stroke="#33E0FF"
    stroke-width="1"
    fill="none"
    opacity="0.6"
