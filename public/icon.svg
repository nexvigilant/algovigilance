  />
  <path
    d="M 135 75 L 145 75 L 145 85"
    stroke="#00D9FF"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.3"
  />
  <path
    d="M 65 125 L 55 125 L 55 115"
    stroke="#00D9FF"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.3"
  />
  <path
    d="M 135 125 L 145 125 L 145 115"
    stroke="#00D9FF"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.3"
  />
